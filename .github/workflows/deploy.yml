name: Deploy to Home Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: telcation.f5.si
          username: appuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: false
          command_timeout: 10s
          script: |
            sudo pkill -9 -u studentXX -f 'app.py' || true
            sleep 2
            sudo -u studentXX git -C /home/studentXX/myapp fetch && \
              sudo -u studentXX git -C /home/studentXX/myapp reset --hard origin/main || \
              (sudo find /home/studentXX/myapp -mindepth 1 -delete && \
               sudo -u studentXX git clone https://github.com/${{ github.repository }} /home/studentXX/myapp)
            sudo -u studentXX pip3 install -r /home/studentXX/myapp/requirements.txt --break-system-packages
            sudo -u studentXX bash -c 'nohup python3 /home/studentXX/myapp/app.py > /home/studentXX/myapp/app.log 2>&1 & disown'
